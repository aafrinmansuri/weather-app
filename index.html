<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">


<style>

/* Loading Spinner */
.loader {
    display: none;
    margin-top: 20px;
}
    
.loader div {
    border: 6px solid #fff;
    border-top: 6px solid transparent;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    margin: auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% {
        transform: rotate(360deg);
    }
}

/* Error Message */
.error {
    display: none;
    margin-top: 20px;
    color: #fff;
    font-size: 18px;
}

/* Location Button */
.location-btn {
    margin-top: 10px;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #ebfffc;
    color: #555;
}

</style>    
</head>

<body>

<div class="card">

    <!-- SEARCH -->
    <div class="search">
        <input type="text"
               placeholder="Enter city name"
               spellcheck="false">

        <button>
            <img src="images/search.png">
        </button>
    </div>

    <!-- LOCATION BUTTON -->
    <button class="location-btn">
        📍 Use Current Location
    </button>

    <!-- LOADING -->
    <div class="loader">
        <div></div>
    </div>

    <!-- ERROR MESSAGE -->
    <div class="error">
        City not found ❌
    </div>

    <!-- WEATHER -->
